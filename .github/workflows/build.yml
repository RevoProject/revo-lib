name: Build revo-lib with OBS 32.x

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: Install dependencies
        run: |
          brew update
          brew install simde ffmpeg mbedtls speexdsp uthash jansson
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Build
        run: cargo build --release
        env:
          RUST_BACKTRACE: 1

      - name: Package libobs prebuilt artifact
        run: |
          ARCH=$(uname -m)
          STAGING="libobs-prebuilt-macos-${ARCH}"
          mkdir -p "${STAGING}/lib"
          mkdir -p "${STAGING}/include"
          mkdir -p "${STAGING}/bindings"

          INSTALL_DIR="obs-libobs/obs-studio/build-headless/install"

          # Compiled library files (dylib + static)
          cp -r "${INSTALL_DIR}/lib/"* "${STAGING}/lib/" 2>/dev/null || true
          cp -r "${INSTALL_DIR}/lib64/"* "${STAGING}/lib/" 2>/dev/null || true

          # Public headers
          cp -r "${INSTALL_DIR}/include/"* "${STAGING}/include/" 2>/dev/null || true

          # obs-config.h generated by cmake (needed by bindgen consumers)
          find obs-libobs/obs-studio/build-headless -name "obs-config.h" \
            | head -1 \
            | xargs -I{} cp {} "${STAGING}/include/obs/" 2>/dev/null || true

          # Pre-generated Rust FFI bindings so consumers can skip bindgen
          BINDINGS=$(find target -name "libobs_bindings.rs" 2>/dev/null | head -1)
          if [ -n "$BINDINGS" ]; then
            cp "$BINDINGS" "${STAGING}/bindings/libobs_bindings.rs"
          fi

          # Minimal metadata
          echo "OBS_REF=$(git -C obs-libobs/obs-studio describe --tags --always 2>/dev/null || echo unknown)" \
            >> "${STAGING}/build-info.env"
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "${STAGING}/build-info.env"
          echo "ARCH=${ARCH}" >> "${STAGING}/build-info.env"

          echo "STAGING=${STAGING}" >> "$GITHUB_ENV"

      - name: Upload libobs prebuilt artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.STAGING }}
          path: ${{ env.STAGING }}/
          if-no-files-found: error
